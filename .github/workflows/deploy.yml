# ============================================================
# NutriClinic SaaS - GitHub Actions Deployment Workflow
# النشر التلقائي على Namecheap عند كل Push لفرع main
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: bun install

      - name: Switch to MySQL Schema
        run: cp prisma/schema.mysql.prisma prisma/schema.prisma

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Create Deployment Package
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone deploy-package/app
          cp -r .next/static deploy-package/app/.next/static
          cp -r public deploy-package/app/public
          cp -r prisma deploy-package/app/prisma
          cp prisma/schema.mysql.prisma deploy-package/app/prisma/schema.prisma
          cp package.json deploy-package/app/

          # Create .env
          cat > deploy-package/app/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          NODE_ENV=production
          ENVEOF

          # Create startup script
          cat > deploy-package/app/start.sh << 'STARTUP'
          #!/bin/bash
          cd "$(dirname "$0")"
          export NODE_ENV=production
          export PORT=3000
          node server.js
          STARTUP
          chmod +x deploy-package/app/start.sh

          cd deploy-package && tar -czf ../deploy.tar.gz app && cd ..

      - name: Upload Deploy Package
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30"

          echo "=== Uploading deployment package ==="
          sshpass -p "$SSH_PASS" scp $SSH_OPTS -P "$SSH_PORT" deploy.tar.gz "$SSH_USER@$SSH_HOST:/home/$SSH_USER/nutriclinic/"

          echo "=== Extracting and restarting ==="
          sshpass -p "$SSH_PASS" ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'DEPLOY'
          cd ~/nutriclinic
          rm -rf app
          tar -xzf deploy.tar.gz
          rm -f deploy.tar.gz
          chmod +x app/start.sh 2>/dev/null || true
          mkdir -p tmp
          touch tmp/restart.txt
          echo "=== Deployment completed at $(date) ==="
          DEPLOY
