# ============================================================
# NutriClinic SaaS - GitHub Actions Deployment Workflow
# النشر التلقائي على Namecheap عند كل Push لفرع main
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: bun install

      - name: Switch to MySQL Schema
        run: cp prisma/schema.mysql.prisma prisma/schema.prisma

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}

      - name: Create Deployment Package
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone deploy-package/app
          cp -r .next/static deploy-package/app/.next/static
          cp -r public deploy-package/app/public
          cp -r prisma deploy-package/app/prisma
          cp prisma/schema.mysql.prisma deploy-package/app/prisma/schema.prisma
          cp package.json deploy-package/app/

          # Create .env
          cat > deploy-package/app/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          NODE_ENV=production
          ENVEOF

          # Create startup script
          cat > deploy-package/app/start.sh << 'STARTUP'
          #!/bin/bash
          cd "$(dirname "$0")"
          export NODE_ENV=production
          export PORT=3000
          node server.js
          STARTUP
          chmod +x deploy-package/app/start.sh

          cd deploy-package && tar -czf ../deploy.tar.gz app && cd ..

      - name: Upload Deploy Package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz

      - name: Deploy via SSH (Direct)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 120s
          script: |
            echo "=== Starting deployment ==="
            cd /home/${{ secrets.SSH_USERNAME }}/nutriclinic
            rm -rf app
            mkdir -p app

      - name: Transfer deploy package via SSH
        run: |
          # Split the tar file into chunks and transfer via SSH
          split -b 5M deploy.tar.gz deploy-chunk-

          for chunk in deploy-chunk-*; do
            echo "Transferring $chunk..."
            cat "$chunk" | ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
              "cat >> /home/${{ secrets.SSH_USERNAME }}/nutriclinic/deploy.tar.gz"
          done

      - name: Extract and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 120s
          script: |
            echo "=== Extracting deployment package ==="
            cd /home/${{ secrets.SSH_USERNAME }}/nutriclinic
            rm -rf app
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz deploy-chunk-*

            # Set permissions
            chmod +x app/start.sh 2>/dev/null || true

            # Restart Node.js app via Passenger
            cd /home/${{ secrets.SSH_USERNAME }}/nutriclinic
            mkdir -p tmp
            touch tmp/restart.txt

            echo "=== Deployment completed at $(date) ==="
