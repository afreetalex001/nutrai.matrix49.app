# ============================================================
# NutriClinic SaaS - GitHub Actions Deployment Workflow
# النشر التلقائي على Namecheap عند كل Push لفرع main
# Uses SSH to trigger server-side git pull and rebuild
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH - Git Pull and Rebuild
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: false
          command_timeout: 300s
          script: |
            echo "=== Starting deployment ==="

            # Navigate to the app directory
            cd /home/${{ secrets.SSH_USERNAME }}/nutriclinic

            # Initialize git if not already
            if [ ! -d .git ]; then
              echo "Initializing git repository..."
              git clone https://github.com/afreetalex001/nutriclinic.matrix49.app.git .
            else
              echo "Pulling latest code..."
              git pull origin main || git fetch origin main && git reset --hard origin/main
            fi

            # Install Node.js dependencies if needed
            echo "Installing dependencies..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Try bun first, then npm
            if command -v bun &> /dev/null; then
              bun install
            elif command -v npm &> /dev/null; then
              npm install
            else
              echo "Neither bun nor npm found, trying with node directly..."
              npm install 2>/dev/null || true
            fi

            # Switch to MySQL schema
            cp -f prisma/schema.mysql.prisma prisma/schema.prisma 2>/dev/null || true

            # Generate Prisma client
            npx prisma generate 2>/dev/null || true

            # Build the application
            echo "Building application..."
            NODE_ENV=production npm run build 2>/dev/null || bun run build 2>/dev/null || true

            # Copy static and public files
            cp -r .next/static .next/standalone/.next/ 2>/dev/null || true
            cp -r public .next/standalone/ 2>/dev/null || true

            # Create .env file
            cat > .next/standalone/.env << 'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          NODE_ENV=production
          ENVEOF

            # Update the app directory for Passenger
            rm -rf app 2>/dev/null || true
            cp -r .next/standalone app 2>/dev/null || true
            cp -r .next/static app/.next/ 2>/dev/null || true
            cp -r public app/ 2>/dev/null || true

            # Restart Passenger
            mkdir -p tmp
            touch tmp/restart.txt

            echo "=== Deployment completed at $(date) ==="
