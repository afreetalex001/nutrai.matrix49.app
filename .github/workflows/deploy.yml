name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: false
          command_timeout: 300s
          script: |
            echo "=== Starting NutriClinic deployment ==="
            cd $HOME/nutriclinic

            # Pull latest code from GitHub
            if [ -d .git ]; then
              echo "Pulling latest code..."
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              git clone https://github.com/afreetalex001/nutriclinic.matrix49.app.git .
            fi

            # Setup Node.js environment
            source $HOME/nodeenv/nutriclinic/bin/activate 2>/dev/null || true
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" 2>/dev/null || true

            echo "Node version: $(node -v 2>/dev/null || echo 'not found')"
            echo "NPM version: $(npm -v 2>/dev/null || echo 'not found')"

            # Install dependencies
            npm install --production=false 2>&1 || true

            # Switch to MySQL schema
            cp -f prisma/schema.mysql.prisma prisma/schema.prisma 2>/dev/null || true

            # Generate Prisma client
            npx prisma generate 2>/dev/null || true

            # Build the application
            echo "Building application..."
            NODE_ENV=production npm run build 2>&1

            # Copy static and public files to standalone
            cp -r .next/static .next/standalone/.next/ 2>/dev/null || true
            cp -r public .next/standalone/ 2>/dev/null || true

            # Create .env file for the standalone build
            cat > .next/standalone/.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}
          WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }}
          NODE_ENV=production
          EOF

            # Update the app directory for Passenger
            rm -rf app 2>/dev/null || true
            cp -r .next/standalone app 2>/dev/null || true

            # Restart Passenger (Node.js app)
            mkdir -p tmp
            touch tmp/restart.txt

            echo "=== Deployment completed at $(date) ==="
