name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without code changes'
        required: false
        default: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          # نسخ الملفات الأساسية
          cp -r .next/standalone deploy-package/.next-standalone
          cp -r .next/static deploy-package/.next-standalone/.next/
          cp -r public deploy-package/.next-standalone/
          cp prisma deploy-package/.next-standalone/prisma -r
          cp package.json deploy-package/.next-standalone/
          cp server.js deploy-package/.next-standalone/
          cp next.config.ts deploy-package/.next-standalone/ 2>/dev/null || true

      - name: Create deployment archive
        run: |
          cd deploy-package/.next-standalone
          tar -czf ../../nutriclinic-deploy.tar.gz .
          cd ../..

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nutriclinic-deploy.tar.gz"
          target: "/home/${{ secrets.SERVER_USER }}/nutriclinic.matrix49.app"

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd $HOME/nutriclinic.matrix49.app

            # نسخ احتياطي للإعدادات
            if [ -f .env.production ]; then
              cp .env.production .env.production.backup
            fi

            # استخراج الحزمة الجديدة
            tar -xzf nutriclinic-deploy.tar.gz
            rm nutriclinic-deploy.tar.gz

            # استعادة الإعدادات
            if [ -f .env.production.backup ]; then
              mv .env.production.backup .env.production
            fi

            # تثبيت Prisma CLI
            npm install prisma @prisma/client --save

            # دفع مخطط قاعدة البيانات
            npx prisma generate
            npx prisma db push --skip-generate

            echo "✅ Deployment completed at $(date)"

      - name: Health check
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nutriclinic.matrix49.app || echo "000")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Site is healthy (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Site returned HTTP $HTTP_STATUS - may need manual restart from cPanel"
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://nutriclinic.matrix49.app" >> $GITHUB_STEP_SUMMARY
