# ============================================================
# NutriClinic SaaS - .htaccess for Passenger
# إعداد Passenger لتشغيل تطبيق Node.js
# ============================================================
#
# Place this file in: ~/public_html/ (or the document root for nutriclinic.matrix49.app)
# This tells Passenger to run the Node.js app instead of serving static files
#
# ============================================================

PassengerEnabled on
PassengerAppType node
PassengerAppRoot /home/matrmlyq/nutriclinic.matrix49.app
PassengerStartupFile app.js
PassengerNodePath /home/matrmlyq/nodejs/bin/node

# Set the environment
SetEnv NODE_ENV production
SetEnv DATABASE_URL mysql://matrmylq_nutriusr:NutriCli@2024Sec@localhost:3306/matrmylq_nutricli
SetEnv MYSQL_HOST localhost
SetEnv MYSQL_PORT 3306
SetEnv MYSQL_USER matrmylq_nutriusr
SetEnv MYSQL_PASSWORD NutriCli@2024Sec
SetEnv MYSQL_DATABASE matrmylq_nutricli
SetEnv JWT_SECRET nc-saas-prod-jwt-s3cur3-k3y-2024
SetEnv NEXT_PUBLIC_APP_URL https://nutriclinic.matrix49.app

# Enable URL rewriting for Next.js
RewriteEngine On

# Don't rewrite for Next.js static files
RewriteCond %{REQUEST_FILENAME} -f [OR]
RewriteCond %{REQUEST_FILENAME} -d
RewriteRule ^ - [L]

# Let Passenger handle all other requests
RewriteRule ^ index.html [L]
